services:
  ums:
    build:
      context: ../..
      dockerfile: dockerspace/host_scripts/Dockerfile
    container_name: ums-app
    volumes:
      - ../../:/ums   # project source — ums-agent, container scripts, and mvnw live here
    ports:
      - "8080:8080"   # Spring Boot API
    env_file:
      - ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ums-network

networks:
  ums-network:
    external: true
